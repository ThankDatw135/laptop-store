name: laptop-store

services:
  mysql:
    image: mysql:8.0
    container_name: laptop-store-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-laptop_store}
      MYSQL_USER: ${MYSQL_USER:-laptop_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-laptop_pass}
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD:-rootpassword}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laptop-store-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - '${PMA_PORT:-8080}:80'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
